# Repository settings managed via probot/settings (https://github.com/repository-settings/app)
# This file documents the desired repository configuration.
# Settings are also applied directly via the GitHub API.

repository:
  topics:
    - react
    - hooks
    - react-hooks
    - typescript
    - audio
    - video

branches:
  - name: main
    protection:
      # Prevent force-pushing to main and protect commit history integrity.
      required_status_checks: null
      enforce_admins: false
      required_pull_request_reviews: null
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
